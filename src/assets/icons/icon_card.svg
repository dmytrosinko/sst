<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Card body -->
  <rect x="8" y="16" width="48" height="32" rx="5" stroke="white" stroke-width="2.5"/>
  <!-- Magnetic stripe -->
  <line x1="8" y1="26" x2="56" y2="26" stroke="white" stroke-width="2.5"/>
  <!-- Chip -->
  <rect x="14" y="31" width="10" height="8" rx="2" stroke="white" stroke-width="1.5"/>
  <line x1="19" y1="31" x2="19" y2="39" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="35" x2="24" y2="35" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Card number dots -->
  <circle cx="34" cy="41" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="38" cy="41" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="42" cy="41" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="46" cy="41" r="1.2" fill="white" opacity="0.6"/>
</svg>
