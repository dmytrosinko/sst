  <line x1="22" y1="32" x2="38" y2="31" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="22" y1="40" x2="34" y2="39" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
